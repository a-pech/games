<!DOCTYPE html>
<html>
<head>
    <title>Game Directory</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        input { padding: 10px; width: 100%; margin-bottom: 20px; border: 1px solid #ccc; }
        a { color: blue; text-decoration: none; display: block; padding: 5px; border-bottom: 1px solid #eee; }
        a:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>My Game Links</h1>
    <input type="text" id="search" placeholder="Search for a game..." onkeyup="filterGames()">
    <div id="game-list">
        </div>

    <script>
        // This script asks GitHub for the list of files in this folder
        async function loadGames() {
            const response = await fetch('https://api.github.com/repos/a-pech/games/contents/');
            const files = await response.json();
            const listDiv = document.getElementById('game-list');
            
            files.forEach(file => {
                if(file.name.endsWith('.html') && file.name !== 'index.html') {
                    const url = `https://a-pech.github.io/games/${file.name}`;
                    const link = document.createElement('a');
                    link.href = url;
                    link.target = "_blank";
                    link.innerHTML = `<strong>Link:</strong> ${url}`;
                    listDiv.appendChild(link);
                }
            });
        }
        
        function filterGames() {
            let input = document.getElementById('search').value.toLowerCase();
            let links = document.getElementsByTagName('a');
            for (let i = 0; i < links.length; i++) {
                links[i].style.display = links[i].innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }
        loadGames();
    </script>
</body>
</html>
